<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>teste003</title>
    <style>
        body{
            font: 1em normal arial;
        }

        div#tela{
              background-color: bisque;
              width: 300px;
              height: 300px;
              display: flex;
              justify-content: center;
              align-items: center;
        }
    </style>
</head>
<body>

    <h1>Teste de tela interativa</h1>
     
    <div id="tela">
        <h2>click em min</h2>
    </div>
     
    <div id="tlf">
        <iframe src="pagina01.html" frameborder="0"></iframe>
    </div>
      
    <script>
        var t = window.document.getElementById('tlf')
        t.addEventListener('click',clicar)

        function clicar(){
            t.innerHTML =`${tlf}`
        }
    </script>
    
</body>
