<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>primeiro programa</title>

    <style>
        /*comentario em css*/
        body{
            background-color: gray;
            font: normal 20px arial;
        }
        h1{
            color: aliceblue;
        }
        p{
            color: aliceblue;
        }
    </style>
</head>
<body>
    <!--comentario em html-->
    <h1>olá, mundo</h1>
    <p>Já me livrei da maldição</p>
    <script>//variavel em JS

        var n1 = Number(window.prompt('Digite uma numero:') ) 

        var n2 = Number(window.prompt('Digite outo numero:') )  

        var s = n1+n2
        window.alert( `A soma entre ${n1} e ${n2} é igual a ${s}`)
        
        //+ + concatenaçâo
        //(number + number) = adição
        //(string+ string) = concatenação
    </script>
</body>
</html>
